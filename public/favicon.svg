<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main Truck Body -->
  <path d="M10 30 H60 V70 H10 Z" fill="url(#gradRed)" />
  <!-- Truck Head -->
  <path d="M60 40 L85 40 L90 70 L60 70 Z" fill="url(#gradRed)" />
  <!-- Window -->
  <path d="M65 45 L80 45 L82 55 L65 55 Z" fill="#ffffff" opacity="0.3" />
  <!-- Wheels -->
  <circle cx="25" cy="75" r="8" fill="#0f172a" />
  <circle cx="75" cy="75" r="8" fill="#0f172a" />
  <!-- Motion Lines for distance visibility - Bright Red -->
  <rect x="0" y="40" width="8" height="4" rx="2" fill="#ef4444" opacity="0.8" />
  <rect x="-5" y="50" width="12" height="4" rx="2" fill="#ef4444" opacity="0.6" />
  <rect x="2" y="60" width="6" height="4" rx="2" fill="#ef4444" opacity="0.4" />
</svg>
