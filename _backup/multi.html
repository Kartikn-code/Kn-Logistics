<!doctype html>
<html>
  <head>
    <title>Multiplication Example</title>
  </head>
  <body>
    <label>Value 1:</label>
    <input type="number" id="num1" oninput="calculate()" />

    <br /><br />

    <label>Value 2:</label>
    <input type="number" id="num2" oninput="calculate()" />

    <br /><br />

    <label>Result:</label>
    <input type="number" id="result" readonly />
    <button
      onclick="
        {
          calculate;
        }
      "
    >
      submit
    </button>

    <script>
      function calculate() {
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;

        document.getElementById("result").value = n1 && n2 ? n1 * n2 : "";
      }
    </script>
  </body>
</html>
