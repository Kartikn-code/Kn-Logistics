runtime: nodejs20

env_variables:
  # The application port. App Engine sets process.env.PORT automatically.
  # Add your production PostgreSQL string here once you provision one on Supabase, Neon, or Cloud SQL
  # DATABASE_URL: "postgresql://username:password@hostname:5432/dbname"
  
  # Your Gmail App Password to successfully verify and send automated "Contact Us" emails
  # Instructions: https://support.google.com/accounts/answer/185833
  EMAIL_USER: "ponniammantransport2023@gmail.com"
  EMAIL_PASS: "ENTER_APP_PASSWORD_HERE"

handlers:
  # Serves the compiled React frontend application (dist folder generated by Vite)
  - url: /(.*\.(html|css|js|png|jpg|ico|svg|json|txt|woff2?|eot|ttf|otf))$
    static_files: dist/\1
    upload: dist/.*\.(html|css|js|png|jpg|ico|svg|json|txt|woff2?|eot|ttf|otf)$
  
  # Fallback for React routing (Directs everything to index.html for CSR navigation)
  - url: /((?!api).*)$
    static_files: dist/index.html
    upload: dist/index.html
    
  # Directs everything else (/api/*) to the Node.js Express server automatically
  - url: /.*
    script: auto
